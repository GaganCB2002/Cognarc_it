services:
  - type: web
    name: studytrack-api
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: node backend/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studytrack-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://cognarc-it.vercel.app
      - key: STORAGE_PROVIDER
        value: GITHUB
      - key: GITHUB_STORAGE_TOKEN
        sync: false
      - key: GITHUB_STORAGE_OWNER
        sync: false
      - key: GITHUB_STORAGE_REPO
        value: studytrack-uploads
      - key: GEMINI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: PYTHON_AI_SERVICE_URL
        value: https://ai-python-service.onrender.com

  - type: web
    name: studytrack-web
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://cognarc-it-1.onrender.com/api
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  - type: web
    name: ai-python-service
    env: docker
    region: oregon
    dockerfilePath: ./python-service/Dockerfile
    plan: standard
    healthCheckPath: /docs
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: studytrack-db
    plan: free
    databaseName: studytrack
