services:
  - type: web
    name: studytrack-api
    runtime: node
    buildCommand: cd backend && npm install && npx prisma generate && npx tsc
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studytrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://studytrack-web.onrender.com

  - type: web
    name: studytrack-web
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://studytrack-api.onrender.com

databases:
  - name: studytrack-db
    plan: free
    databaseName: studytrack
