<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyTrack Extension Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      width: 400px;
      padding: 24px;
      margin: 0;
      background-color: #0A0A0A;
      color: #F5F5F5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 1px solid #222222;
      padding-bottom: 16px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background-color: #D4A043;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: black;
      font-size: 18px;
    }
    h1 {
      font-size: 20px;
      margin: 0;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #999999;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      background-color: #1A1A1A;
      border: 1px solid #333333;
      border-radius: 6px;
      color: #FFFFFF;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #D4A043;
    }
    .hint {
      font-size: 11px;
      color: #666666;
      margin-top: 6px;
    }
    .btn-save {
      width: 100%;
      padding: 12px;
      background-color: #D4A043;
      color: #000000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    .btn-save:hover {
      background-color: #E5B254;
    }
    .status {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      font-weight: 500;
    }
    .status.success { color: #4ADE80; }
    .status.error { color: #F87171; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h1>StudyTrack Configuration</h1>
  </div>
  
  <div class="form-group">
    <label for="apiUrl">Backend API URL</label>
    <input type="text" id="apiUrl" placeholder="https://cognarc-it-1.onrender.com/api">
    <div class="hint">The URL of your StudyTrack deployment (e.g. https://studytrack-api.onrender.com/api)</div>
  </div>

  <div class="form-group">
    <label for="userId">User Authentication Token</label>
    <input type="password" id="userId" placeholder="Enter your User ID or Token">
    <div class="hint">Found in your StudyTrack Dashboard Settings under "API Keys"</div>
  </div>

  <button class="btn-save" id="btn-save">Save Configuration</button>
  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
