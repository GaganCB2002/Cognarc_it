<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Accent Neon Gradients -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />    <!-- Blue -->
      <stop offset="50%" stop-color="#8b5cf6" />   <!-- Purple -->
      <stop offset="100%" stop-color="#ec4899" />  <!-- Pink -->
    </linearGradient>

    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagonal Border Shield -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="3" />

  <!-- Inner Glowing Pathways (S-Curve & Graduation Cap / Code combination) -->
  <g filter="url(#glow)">
    <!-- Top Cap Diamond / Terminal prompt symbol style -->
    <polygon points="50,22 68,32 50,42 32,32" fill="none" stroke="url(#glowGrad)" stroke-width="2.5" stroke-linejoin="round" />
    <line x1="50" y1="42" x2="50" y2="52" stroke="url(#glowGrad)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Floating Cap Tassel / Code Brackets -->
    <path d="M 68,32 C 75,37 75,47 70,55" fill="none" stroke="#ec4899" stroke-width="2" stroke-linecap="round" />

    <!-- Sleek "S" learning path flowing upwards -->
    <path d="M 32,70 
             C 32,60 42,56 50,56 
             C 58,56 68,52 68,42 
             C 68,32 58,28 50,28" 
          fill="none" stroke="url(#accentGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Target Finish Dot -->
    <circle cx="50" cy="28" r="3.5" fill="#00f2fe" />
    
    <!-- Code Prompt Chevron Style Bottom -->
    <path d="M 36,75 L 42,78 L 36,81" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Blinking cursor -->
    <line x1="45" y1="81" x2="55" y2="81" stroke="#00f2fe" stroke-width="2.5" stroke-linecap="round" />
  </g>
</svg>
